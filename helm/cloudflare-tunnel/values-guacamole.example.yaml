# Example-only scaffolding for the Cloudflare Tunnel Helm chart.
# Target chart: helmforge/cloudflared.
# This file is secretless and does not deploy anything by itself.

tunnel:
  existingSecret: "cloudflared-guacamole-token"
  existingSecretKey: "token"

notes:
  - "Cloudflare Access is optional; add it later only if Scott wants an identity gate."
  - "Do not put real tokens, passwords, or secret material in this file."
  - "The token secret belongs in the cloudflare namespace and must be created manually."
  - "Hostname routing is configured in the Cloudflare dashboard, not in this chart."
