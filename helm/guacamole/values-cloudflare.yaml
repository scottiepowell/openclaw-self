# Cloudflare Tunnel planning values for the future public phase.
#
# Tunnel is the connectivity path; Cloudflare Access is optional hardening later.
# Do not apply public exposure until Scott approves the tunnel deployment.

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false

totp:
  # Keep built-in TOTP enabled for the final public path.
  enabled: true

cloudflareTunnel:
  # Placeholder for docs only; the chart does not deploy Cloudflare Tunnel itself.
  publicHostname: "guacamole.example.com"
  originService: "http://guacamole-guacamole.guacamole.svc.cluster.local:80"

postgresql:
  enabled: true
  architecture: standalone
  auth:
    database: guacamole_db
    username: guacamole_user
    existingSecret: guacamole-postgresql-auth
  standalone:
    persistence:
      enabled: true
      storageClass: nfs-client
      accessModes:
        - ReadWriteOnce
      size: 8Gi

backup:
  enabled: false
