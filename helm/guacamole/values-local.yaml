# Local-first Guacamole install values
#
# Chart: helmforge/guacamole
# - guacamole web app
# - guacd sidecar
# - bundled PostgreSQL subchart
#
# Cluster note:
# - Use the NFS-backed StorageClass here.
# - Current cluster has `nfs-client` and `nfs-static`; this scaffold assumes `nfs-client`.
# - Temporary scheduling pin keeps Guacamole + PostgreSQL on worker-01 because
#   the devops node currently cannot route to the PostgreSQL pod/service CIDR.

nameOverride: ""
fullnameOverride: ""
commonLabels:
  app.kubernetes.io/part-of: guacamole

image:
  repository: docker.io/guacamole/guacamole
  tag: "1.6.0"

guacd:
  image:
    repository: docker.io/guacamole/guacd
    tag: "1.6.0"
  logLevel: info

guacamole:
  contextPath: ROOT
  extraEnv: []

# Temporary workaround: keep the app pod on the same worker as PostgreSQL.
# Remove after cluster pod-to-pod routing is fixed and verify with Helm upgrade.
nodeSelector:
  kubernetes.io/hostname: worker-01

proxy:
  enabled: true
  ipHeader: X-Forwarded-For
  protocolHeader: X-Forwarded-Proto

oidc:
  enabled: false

saml:
  enabled: false

totp:
  # Enable Guacamole's built-in TOTP extension for the local/LAN phase.
  enabled: true

database:
  type: postgresql

initDb:
  # Already bootstrapped in this cluster; keep the post-install hook disabled
  # until the chart exposes node scheduling for it.
  enabled: false

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false

probes:
  startup:
    enabled: true
  liveness:
    enabled: true
  readiness:
    enabled: true

backup:
  enabled: false

postgresql:
  enabled: true
  architecture: standalone
  nodeSelector:
    kubernetes.io/hostname: worker-01
  auth:
    database: guacamole_db
    username: guacamole_user
    existingSecret: guacamole-postgresql-auth
  standalone:
    persistence:
      enabled: true
      storageClass: nfs-client
      accessModes:
        - ReadWriteOnce
      size: 8Gi

mysql:
  enabled: false
